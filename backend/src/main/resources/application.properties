spring.application.name=gestion-escolar

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/escuela_gestion?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate  (sin dialect manual -> Hibernate lo detecta solo en v6)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
# Valor por defecto SOLO para desarrollo local. En cualquier entorno real,
# define la variable de entorno JWT_SECRET con un valor propio.
app.jwt.secret=${JWT_SECRET:dev-only-change-me-before-any-real-deploy}
app.jwt.expiration=86400000

# Usuario administrador inicial (ver DataInitializer) - configurable por entorno
app.admin.email=${ADMIN_EMAIL:admin@escuela.com}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Server
server.address=0.0.0.0
server.port=8080
