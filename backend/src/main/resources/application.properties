spring.application.name=gestion-escolar

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/escuela_gestion?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate  (sin dialect manual -> Hibernate lo detecta solo en v6)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=EscuelaGestionSecretKeyMuyLargaParaJWT2024!@#$%
app.jwt.expiration=86400000

# Server
server.port=8080
